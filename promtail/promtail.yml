server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: syslogs
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/*.log

  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /saad-nginx-logs/*.log

  - job_name: Grafana
    static_configs:
      - targets:
          - localhost
        labels:
          job: grafana-logs
          __path__: /var/log/grafana/*.log
      - targets:
          - localhost
        labels:
          job: anaconda-logs
          __path__: /var/log/anaconda/anaconda.log
